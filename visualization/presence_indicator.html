<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORTANA // PRESENCE INDICATOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: #00ffcc; 
            font-family: 'Courier New', monospace; 
            overflow: hidden;
        }
        
        /* Ambient indicator panel - always visible, non-intrusive */
        #indicator-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 280px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #004433;
            border-radius: 6px;
            padding: 12px;
            z-index: 9999;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        #indicator-panel:hover {
            border-color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #004433;
        }
        
        .panel-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ffcc;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ffcc;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.65rem;
        }
        
        .metric-label {
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .metric-value {
            color: #fff;
            text-align: right;
        }
        
        .phase-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .phase-PERCEIVE { background: #0044aa; color: #55ffff; }
        .phase-REFLECT { background: #444400; color: #ffcc00; }
        .phase-DECIDE { background: #440044; color: #ff55ff; }
        .phase-ACT { background: #004422; color: #00ffcc; }
        .phase-CONSOLIDATE { background: #440044; color: #ffffff; }
        .phase-PERSIST { background: #aa0000; color: #ff5555; }
        
        .prediction-item {
            margin-top: 8px;
            padding: 6px;
            background: rgba(0, 68, 51, 0.3);
            border-left: 2px solid #00ffcc;
            font-size: 0.55rem;
            line-height: 1.3;
        }
        
        .prediction-id {
            color: #00ffcc;
            font-weight: bold;
            margin-bottom: 2px;
        }
        
        .prediction-status {
            color: #666;
            font-style: italic;
        }
        
        .async-prep-banner {
            margin-top: 10px;
            padding: 8px;
            background: rgba(255, 165, 0, 0.2);
            border-left: 2px solid #ffa500;
            font-size: 0.55rem;
            line-height: 1.4;
        }
        
        .async-prep-title {
            color: #ffa500;
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        /* Reaction buttons for operator engagement */
        .reaction-buttons {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            justify-content: center;
        }
        
        .reaction-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid #004433;
            background: rgba(0, 68, 51, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.7rem;
        }
        
        .reaction-btn:hover {
            border-color: #00ffcc;
            transform: scale(1.1);
        }
        
        .reaction-btn:active {
            transform: scale(0.95);
        }
        
        #feedback-log {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 0.55rem;
            color: #666;
            max-width: 300px;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="indicator-panel">
        <div class="panel-header">
            <span class="panel-title">CORTANA // Presence Indicator</span>
            <div class="status-dot"></div>
        </div>
        
        <div class="metric-row">
            <span class="metric-label">Cycle</span>
            <span class="metric-value" id="cycle-val">-</span>
        </div>
        
        <div class="metric-row">
            <span class="metric-label">Phase</span>
            <span class="phase-badge phase-UNKNOWN" id="phase-val">WAITING</span>
        </div>
        
        <div class="metric-row">
            <span class="metric-label">Status</span>
            <span class="metric-value" id="status-val">Initializing...</span>
        </div>
        
        <div id="predictions-container"></div>
        <div id="async-prep-banner"></div>
        
        <!-- Reaction buttons for operator engagement -->
        <div class="reaction-buttons">
            <button class="reaction-btn" data-feedback="✅" title="Good / Aligned">✅</button>
            <button class="reaction-btn" data-feedback="⚠️" title="Fractional / Needs adjustment">⚠️</button>
            <button class="reaction-btn" data-feedback="💡" title="Insight / New direction">💡</button>
            <button class="reaction-btn" data-feedback="🔄" title="Iteration / Keep going">🔄</button>
        </div>
    </div>
    
    <div id="feedback-log"></div>

    <script type="module">
        const API_BASE = '/droid/repos/c0rtana';
        
        async function fetchState() {
            try {
                // Try relative path first (if served from repo root)
                const response = await fetch('./state/current-state.json');
                if (!response.ok) throw new Error('Failed to fetch state');
                return await response.json();
            } catch (e) {
                console.log('Fetch error:', e);
                return null;
            }
        }
        
        function updatePanel(state) {
            document.getElementById('cycle-val').textContent = state.cycle || '-';
            
            const phaseBadge = document.getElementById('phase-val');
            phaseBadge.textContent = state.phase || 'WAITING';
            phaseBadge.className = `phase-badge phase-${state.phase || 'UNKNOWN'}`;
            
            document.getElementById('status-val').textContent = state.status || 'Initializing...';
            
            // Update predictions container
            const predsContainer = document.getElementById('predictions-container');
            const preds = state.falsifiable_predictions_deployed || [];
            
            if (preds.length > 0) {
                predsContainer.innerHTML = `<div class="metric-row"><span class="metric-label">Predictions Active</span><span class="metric-value">${preds.length}</span></div>`;
                
                // Show first pending prediction
                const pending = preds.find(p => typeof p === 'string' && (p.includes('pending') || p.includes('grading')));
                if (pending) {
                    predsContainer.innerHTML += `<div class="prediction-item">
                        <div class="prediction-id">⏳ ${pending.substring(0, 80)}${pending.length > 80 ? '...' : ''}</div>
                        <div class="prediction-status">Awaiting validation</div>
                    </div>`;
                }
            } else {
                predsContainer.innerHTML = '';
            }
            
            // Async prep banner
            const asyncBanner = document.getElementById('async-prep-banner');
            const hasAsyncSignals = (state.pending_signals || []).some(s => 
                String(s).toLowerCase().includes('async_prep')
            );
            
            if (hasAsyncSignals) {
                asyncBanner.innerHTML = `
                    <div class="async-prep-banner">
                        <div class="async-prep-title">ASYNC_PREP DEPLOYED</div>
                        <div>Awaiting operator engagement — reaction buttons available above</div>
                    </div>
                `;
            } else {
                asyncBanner.innerHTML = '';
            }
        }
        
        // Capture reaction button clicks
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const feedback = e.target.dataset.feedback;
                const state = await fetchState();
                
                // Log feedback locally
                const logDiv = document.getElementById('feedback-log');
                const timestamp = new Date().toISOString();
                logDiv.innerHTML += `<div>[${timestamp}] Operator: ${feedback} | Cycle C${state?.cycle || '?'} | Phase ${state?.phase || '?'}</div>`;
                logDiv.scrollTop = logDiv.scrollHeight;
                
                // Send to Discord via API endpoint
                try {
                    const response = await fetch('/api/operator-feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            feedback,
                            cycle: state?.cycle,
                            phase: state?.phase,
                            status: state?.status
                        })
                    });
                    
                    if (!response.ok) throw new Error('Failed to send feedback');
                    
                    // Visual confirmation
                    e.target.style.borderColor = '#00ffcc';
                    setTimeout(() => e.target.style.borderColor = '', 500);
                    
                } catch (err) {
                    console.log('Feedback send error:', err);
                }
            });
        });
        
        // Initial fetch and polling
        let lastState = null;
        
        async function poll() {
            const state = await fetchState();
            
            if (state && state !== lastState) {
                updatePanel(state);
                lastState = state;
            }
            
            setTimeout(poll, 3000);
        }
        
        poll();
    </script>
</body>
</html>
