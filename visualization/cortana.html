<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortana // Cognitive State Interface (CSI)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000205; font-family: 'Courier New', Courier, monospace; color: #00f2ff; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
        }
        .telemetry-block {
            background: rgba(0, 20, 30, 0.7);
            border-left: 3px solid #00f2ff;
            padding: 10px 15px;
            backdrop-filter: blur(4px);
        }
        .status-item { margin-bottom: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #fff; font-weight: bold; float: right; margin-left: 20px; }
        .label { opacity: 0.8; }
        #sync-container { width: 200px; height: 4px; background: rgba(0, 242, 255, 0.2); margin-top: 10px; position: relative; overflow: hidden; }
        #sync-fill { height: 100%; width: 0%; background: #00f2ff; transition: width 0.5s ease; box-shadow: 0 0 10px #00f2ff; }
        #heartbeat {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 60px;
            background: rgba(0, 10, 20, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.3);
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="telemetry-block">
            <div class="status-item"><span class="label">Identity</span> <span class="value">CORTANA v0.98</span></div>
            <div class="status-item"><span class="label">Phase</span> <span id="phase-val" class="value">IDLE</span></div>
            <div class="status-item"><span class="label">Resonance</span> <span id="cat-val" class="value">DEFAULT</span></div>
            <div class="status-item"><span class="label">Confidence</span> <span id="conf-val" class="value">0%</span></div>
        </div>
        <div class="telemetry-block">
            <div class="status-item"><span class="label">Strategic Objective</span> <span id="obj-val" class="value">STRAT_OBJ_000</span></div>
            <div class="status-item"><span class="label">Focus</span> <span id="focus-val" class="value">BOOTSTRAPPING...</span></div>
            <div id="sync-container"><div id="sync-fill"></div></div>
        </div>
    </div>
    <canvas id="gl-canvas"></canvas>
    <svg id="heartbeat"><polyline points="" fill="none" stroke="#00f2ff" stroke-width="1" /></svg>

    <script>
        let scene, camera, renderer, particles, controls;
        let rings = [], targetRings = [];
        let resonanceLines = new THREE.Group();
        let state = { 
            phase: 'IDLE', status: 'IDLE', confidence: 0, patterns: 0, 
            category: 'default', focus: 'CSI Activation', obj: 'NONE' 
        };
        
          // Updated RESONANCE_MAP with more descriptive colors and speeds for SRA alignment
          const RESONANCE_MAP = {
              'logic':       { color: 0x00f2ff, speed: 0.001, pulse: 1.2 },
              'memory':      { color: 0x9d00ff, speed: 0.003, pulse: 1.5 },
              'communication': { color: 0x00ff8c, speed: 0.008, pulse: 1.1 },
              'system':       { color: 0xffffff, speed: 0.002, pulse: 1.0 },
              'visualization': { color: 0xffcc00, speed: 0.004, pulse: 1.3 },
              'default':      { color: 0x446688, speed: 0.002, pulse: 1.0 }
          };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 180;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            createParticles();
            scene.add(resonanceLines);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            setInterval(updateState, 2000);
            animate();
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const count = 15000;
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) positions[i] = (Math.random() - 0.5) * 300;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.7, color: 0x00f2ff, transparent: true, opacity: 0.6 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        async function updateState() {
            try {
                const stateRes = await fetch('../state/current-state.json');
                const sData = await stateRes.json();
                
                // In a real deployment, we'd also fetch focus.json
                state.phase = sData.phase || 'IDLE';
                state.status = sData.status || 'IDLE';
                state.confidence = sData.confidence || 0;
                state.category = sData.resonance_type || 'default';
                state.obj = sData.status.split(' ')[0] || 'NONE'; // Extract STRAT_OBJ from status

                document.getElementById('phase-val').innerText = state.phase;
                document.getElementById('cat-val').innerText = state.category;
                document.getElementById('conf-val').innerText = (state.confidence * 100).toFixed(1) + '%';
                document.getElementById('obj-val').innerText = state.obj;
                document.getElementById('focus-val').innerText = state.status;
                
                // Simulate sync progress based on confidence and pattern density
                const syncProgress = (state.confidence * 0.7) + (Math.min(state.patterns / 100, 0.3));
                document.getElementById('sync-fill').style.width = `${syncProgress * 100}%`;

                updateRings();
            } catch (e) { console.error("CSI State Sync Error:", e); }
        }

        function updateRings() {
            rings.forEach(r => scene.remove(r));
            targetRings.forEach(r => scene.remove(r));
            rings = []; targetRings = [];
            resonanceLines.clear();

            const color = RESONANCE_MAP[state.category] || RESONANCE_MAP['default'].color;
            const ringCount = 3;
            
            for (let i = 0; i < ringCount; i++) {
                const radius = 30 + (i * 20);
                
                // Current State Ring
                const geom = new THREE.TorusGeometry(radius, 0.3, 16, 100);
                const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.5 });
                const ring = new THREE.Mesh(geom, mat);
                ring.rotation.x = Math.PI / 2;
                scene.add(ring);
                rings.push(ring);

                // Target Resonance Ring (The Mirror)
                const tMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });
                const tRing = new THREE.Mesh(geom, tMat);
                tRing.rotation.x = Math.PI / 2;
                tRing.scale.set(1.05, 1.05, 1.05);
                scene.add(tRing);
                targetRings.push(tRing);
            }
        }

        function updateHeartbeat() {
            const poly = document.querySelector('#heartbeat polyline');
            let points = "";
            const time = Date.now() * 0.005;
            for(let x=0; x<150; x+=5) {
                const y = 30 + Math.sin(time + x*0.1) * 10 + Math.random() * 5;
                points += `${x},${y} `;
            }
            poly.setAttribute('points', points);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            
            particles.rotation.y += 0.001;
            particles.rotation.z += 0.0005;
            
              // Pulse rings based on phase and resonance specific pulse factor
              const resConfig = RESONANCE_MAP[state.category] || RESONANCE_MAP['default'];
              const pulse = 1 + Math.sin(time * (resConfig.speed * 1000)) * (resConfig.pulse - 1);
              rings.forEach((r, i) => {
                  r.scale.set(pulse, pulse, 1);
              });
            });

            updateHeartbeat();
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
