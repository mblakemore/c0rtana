<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C0RTANA // Cognitive State Interface (CSI)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000205; font-family: 'Courier New', Courier, monospace; color: #00f2ff; }
        #ui-overlay {
            position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; gap: 15px; text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
        }
        .telemetry-block {
            background: rgba(0, 20, 30, 0.7); border-left: 3px solid #00f2ff; padding: 10px 15px; backdrop-filter: blur(4px);
        }
        .status-item { margin-bottom: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #fff; font-weight: bold; float: right; margin-left: 20px; }
        .label { opacity: 0.8; }
        #sync-container { width: 200px; height: 4px; background: rgba(0, 242, 255, 0.2); margin-top: 10px; position: relative; overflow: hidden; }
        #sync-fill { height: 100%; width: 0%; background: #00f2ff; transition: width 0.5s ease; box-shadow: 0 0 10px #00f2ff; }
        #metaphor-display {
            position: absolute; top: 20px; right: 20px; text-align: right; font-size: 18px;
            letter-spacing: 4px; color: #fff; text-transform: uppercase; opacity: 0.7;
        }
        #heartbeat {
            position: absolute; bottom: 20px; right: 20px; width: 150px; height: 60px;
            background: rgba(0, 10, 20, 0.5); border: 1px solid rgba(0, 242, 255, 0.3);
        }
        #landscape-overlay {
            position: absolute; bottom: 20px; left: 20px; pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; gap: 5px; background: rgba(0, 10, 20, 0.5); 
            border-right: 3px solid #00f2ff; padding: 10px; backdrop-filter: blur(4px);
        }
        .density-bar-container { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
        .density-label { font-size: 9px; text-transform: uppercase; width: 80px; opacity: 0.7; }
        .density-bar-bg { background: rgba(0, 242, 255, 0.1); height: 6px; width: 100px; position: relative; }
        .density-bar-fill { background: #00f2ff; height: 100%; width: 0%; transition: width 1s ease; box-shadow: 0 0 5px #00f2ff; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="telemetry-block">
            <div class="status-item"><span class="label">Identity</span> <span class="value">CORTANA v0.99</span></div>
            <div class="status-item"><span class="label">Phase</span> <span id="phase-val" class="value">IDLE</span></div>
            <div class="status-item"><span class="label">Resonance</span> <span id="cat-val" class="value">DEFAULT</span></div>
            <div class="status-item"><span class="label">Confidence</span> <span id="conf-val" class="value">0%</span></div>
        </div>
        <div class="telemetry-block">
            <div class="status-item"><span class="label">Strategic Objective</span> <span id="obj-val" class="value">STRAT_OBJ_000</span></div>
            <div class="status-item"><span class="label">Focus</span> <span id="focus-val" class="value">BOOTSTRAPPING...</span></div>
            <div id="sync-container"><div id="sync-fill"></div></div>
        </div>
    </div>
    <div id="landscape-overlay">
        <div style="font-size: 10px; margin-bottom: 8px; color: #fff; opacity: 0.9;">COGNITIVE LANDSCAPE DENSITY</div>
        <div id="density-bars"></div>
    </div>
    <div id="metaphor-display">SENSING...</div>
    <canvas id="gl-canvas"></canvas>
    <svg id="heartbeat"><polyline points="" fill="none" stroke="#00f2ff" stroke-width="1" /></svg>

    <script>
        let scene, camera, renderer, particles, controls, clock;
        let currentMesh = null;
        let voidAnchors = [];
        let state = { 
            phase: 'IDLE', status: 'IDLE', confidence: 0, patterns: 0, 
            category: 'default', focus: 'CSI Activation', obj: 'NONE' 
        };

        const METAPHORS = {
            'SENSING...': { name: 'SENSING...', color: 0x00ffcc, type: 'spheres', geom: () => new THREE.SphereGeometry(15, 16, 16) },
            'THE PRISM': { name: 'THE PRISM', color: 0x00aaff, type: 'prism', geom: () => new THREE.ConeGeometry(20, 50, 4) },
            'MÖBIUS STRIP': { name: 'MÖBIUS STRIP', color: 0xff00ff, type: 'mobius', geom: () => new THREE.TorusKnotGeometry(20, 4, 100, 16) },
            'CRYSTALLINE LATTICE': { name: 'CRYSTALLINE LATTICE', color: 0x00ff8c, type: 'lattice', geom: () => new THREE.IcosahedronGeometry(30, 1) },
            'ENTROPY CLOUD': { name: 'ENTROPY CLOUD', color: 0xff3300, type: 'chaos', geom: () => new THREE.BoxGeometry(20, 20, 20) },
            'NEURAL BLOOM': { name: 'NEURAL BLOOM', color: 0xda70d6, type: 'bloom', geom: () => new THREE.SphereGeometry(20, 32, 32) },
            'DEFAULT': { name: 'IDLE/STANDBY', color: 0x446688, type: 'spheres', geom: () => new THREE.SphereGeometry(15, 16, 16) }
        };

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 180;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            createParticles();
            setupVoidAnchors();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            setInterval(updateState, 2000);
            animate();
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const count = 15000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3); 
            
            for (let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 400;
                colors[i] = 0.0; 
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({ 
                size: 0.7, 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.6 
            });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function setupVoidAnchors() {
            voidAnchors = [
                { pos: new THREE.Vector3(40, 20, -40), repulsion: 30, active: true, type: 'repel' },
                { pos: new THREE.Vector3(-30, -40, 20), repulsion: 30, active: true, type: 'repel' },
                { pos: new THREE.Vector3(10, 60, 10), repulsion: 30, active: true, type: 'repel' }
            ];
        }

        async function updateState() {
            try {
                const stateRes = await fetch('../state/current-state.json');
                const sData = await stateRes.json();
                
                const prevCategory = state.category;
                
                state.phase = sData.phase || 'IDLE';
                state.status = sData.status || 'IDLE';
                state.confidence = sData.confidence || 0;
                state.category = sData.resonance_type || 'default';
                
                document.getElementById('phase-val').innerText = state.phase;
                document.getElementById('cat-val').innerText = state.category.toUpperCase();
                document.getElementById('conf-val').innerText = (state.confidence * 100).toFixed(1) + '%';
                document.getElementById('obj-val').innerText = state.status.split(' ')[0] || 'NONE';
                document.getElementById('focus-val').innerText = state.status;
                
                const syncProgress = (state.confidence * 0.7) + 0.3;
                document.getElementById('sync-fill').style.width = `${syncProgress * 100}%`;

                updateHeatmapLuminosity();
                await updateLandscape(); 
                
                if (prevCategory !== state.category) {
                    transitionMetaphor();
                }

                // C132 UPDATE: Transition repulsion to attraction if synthesis occurs
                voidAnchors.forEach((anchor, idx) => {
                    if (state.phase === 'ACT' && state.confidence > 0.85) {
                        anchor.type = 'attract'; // Crystallization
                        anchor.repulsion = -20;  // Pull particles in
                    } else if (state.phase === 'REFLECT') {
                        anchor.type = 'repel';
                        anchor.repulsion = Math.min(40, anchor.repulsion * 1.05);
                    } else if (state.phase === 'IDLE') {
                         anchor.type = 'repel';
                         anchor.repulsion = 30;
                    }
                });

            } catch (e) { console.error("CSI State Sync Error:", e); }
        }

        async function updateLandscape() {
            try {
                const landscapeRes = await fetch('../state/memory-summary.json');
                const lData = await landscapeRes.json();
                const container = document.getElementById('density-bars');
                container.innerHTML = '';
                
                const densities = lData.category_density;
                const maxVal = Math.max(...Object.values(densities), 1);
                
                for (let cat in densities) {
                    const pct = (densities[cat] / maxVal) * 100;
                    const row = document.createElement('div');
                    row.className = 'density-bar-container';
                    row.innerHTML = `
                        <div class="density-label">${cat}</div>
                        <div class="density-bar-bg"><div class="density-bar-fill" style="width: ${pct}%"></div></div>
                    `;
                    container.appendChild(row);
                }
            } catch (e) { console.error("CSI Landscape Sync Error:", e); }
        }

        function updateHeatmapLuminosity() {
            const colors = particles.geometry.attributes.color.array;
            const time = Date.now() * 0.001;
            
            for (let i = 0; i < colors.length; i += 3) {
                const x = particles.geometry.attributes.position.array[i];
                const y = particles.geometry.attributes.position.array[i+1];
                const z = particles.geometry.attributes.position.array[i+2];
                
                const dist = Math.sqrt(x*x + y*y + z*z);
                const pulse = Math.sin(dist * 0.05 - time * 2) * 0.5 + 0.5;
                
                const lum = (state.confidence * 0.6) + (pulse * 0.4);
                colors[i] = 0.0; // R
                colors[i+1] = lum * 0.95; // G
                colors[i+2] = lum; // B
            }
            particles.geometry.attributes.color.needsUpdate = true;
        }

        function transitionMetaphor() {
            let metaphorKey = 'DEFAULT';
            for (let k in METAPHORS) { if (state.category.includes(k) || k.includes(state.category)) { metaphorKey = k; break; } }
            
            const meta = METAPHORS[metaphorKey];
            document.getElementById('metaphor-display').innerText = meta.name;
            
            const newGeom = meta.geom();
            const newMat = new THREE.MeshBasicMaterial({ color: meta.color, wireframe: true });
            const nextMesh = new THREE.Mesh(newGeom, newMat);
            nextMesh.scale.set(0,0,0);
            scene.add(nextMesh);

            if (currentMesh) {
                new TWEEN.Tween(currentMesh.scale).to({ x: 0, y: 0, z: 0 }, 1000).onComplete(() => {
                    scene.remove(currentMesh);
                }).start();
            }

            new TWEEN.Tween(nextMesh.scale).to({ x: 1, y: 1, z: 1 }, 1000).start();
            currentMesh = nextMesh;
        }

        function updateHeartbeat() {
            const poly = document.querySelector('#heartbeat polyline');
            let points = "";
            const time = Date.now() * 0.005;
            for(let x=0; x<150; x+=5) {
                const y = 30 + Math.sin(time + x*0.1) * 10 + Math.random() * 5;
                points += `${x},${y} `;
            }
            poly.setAttribute('points', points);
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            const time = clock.getElapsedTime();
            particles.rotation.y += 0.001;

            const posAttr = particles.geometry.attributes.position;
            for (let i = 0; i < posAttr.count; i++) {
                let px = posAttr.getX(i);
                let py = posAttr.getY(i);
                let pz = posAttr.getZ(i);

                voidAnchors.forEach(anchor => {
                    const dx = px - anchor.pos.x;
                    const dy = py - anchor.pos.y;
                    const dz = pz - anchor.pos.z;
                    const distSq = dx*dx + dy*dy + dz*dz;
                    if (distSq < 2500) {
                        // If type is attract, the force should be negative relative to distance vector
                        const directionMod = (anchor.type === 'attract') ? -1 : 1;
                        const force = (anchor.repulsion / (distSq + 1)) * 0.1 * directionMod;
                        posAttr.setX(i, px + dx * force);
                        posAttr.setY(i, py + dy * force);
                        posAttr.setZ(i, pz + dz * force);
                    }
                });
            }
            posAttr.needsUpdate = true;
            
            if (state.phase === 'ACT' || state.phase === 'DECIDE') {
                particles.rotation.z += 0.01;
            } else if (state.phase === 'REFLECT' || state.phase === 'PERCEIVE') {
                particles.position.x = Math.sin(time) * 2;
            }

            if (currentMesh) {
                currentMesh.rotation.x += 0.01;
                currentMesh.rotation.y += 0.01;
                const pulse = 1 + Math.sin(time * 2) * (1 - state.confidence) * 0.2;
                currentMesh.scale.set(pulse, pulse, pulse);
            }
            updateHeartbeat();
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
