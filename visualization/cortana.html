<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORTANA // State Visualizer</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; }
        #sidebar { width: 300px; padding: 20px; border-right: 1px solid #333; height: 100vh; box-sizing: border-box; background: rgba(0,0,0,0.9); z-index: 10; transition: all 0.5s ease; }
        #canvas-container { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; cursor: crosshair; }
        canvas { filter: drop-shadow(0 0 15px #00ffcc77); }
        .metric { margin-bottom: 15px; font-size: 0.8rem; opacity: 0.9; }
        .label { color: #666; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        .value { font-size: 1.1rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        h2 { font-size: 0.9rem; border-bottom: 1px solid #00ffcc; padding-bottom: 10px; letter-spacing: 3px; margin-top: 0; }
        .status-tag { font-size: 0.6rem; background: #004433; padding: 2px 5px; border-radius: 3px; vertical-align: middle; margin-left: 10px; }

        /* Interactive cursor ring */
        .cursor-ring { 
            position: absolute; 
            width: 40px; 
            height: 40px; 
            border: 2px solid rgba(0, 255, 204, 0.3);
            border-radius: 50%; 
            pointer-events: none; 
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            z-index: 9999;
        }
        
        #interaction-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 204, 0.6);
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 4px;
            user-select: none;
        }

        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* External control indicator */
        #control-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.6rem;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            padding: 8px 12px;
            border-radius: 3px;
            opacity: 0.7;
            transition: all 0.3s ease;
            z-index: 10000;
        }
        #control-indicator.connected {
            opacity: 1;
            background: rgba(0, 255, 204, 0.2);
            box-shadow: 0 0 10px #00ffcc44;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>CORTANA <span class="status-tag">ACTIVE</span></h2>
        <div class="metric"><div class="label">Cycle</div><div id="val-cycle" class="value">-</div></div>
        <div class="metric"><div class="label">Phase</div><div id="val-phase" class="value">-</div></div>
        <div class="metric"><div class="label">Status</div><div id="val-status" class="value">-</div></div>
        <div class="metric"><div class="label">Internal Tension</div><div id="val-tension" class="value">-</div></div>
        <div class="metric"><div class="label">External Focus</div><div id="val-focus" class="value">-</div></div>
        <div style="margin-top: 50px;" class="label">Telemetry Stream</div>
        <div id="log-stream" style="font-size: 0.6rem; color: #444; height: 200px; overflow hidden; line-height: 1.4;"></div>
    </div>
    <div id="canvas-container">
        <canvas id="vizCanvas"></canvas>
    </div>

    <!-- Interactive cursor ring -->
      <!-- Analytics tracker (separate module) -->
      <script src="../analytics/analytics_client.js"></script>
    <div class="cursor-ring" id="cursor-ring"></div>
    <div id="interaction-hint">Move cursor to interact with visual field</div>
    
    <!-- Explicit interaction hooks for operator engagement */}
    <div id="engagement-controls" style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button id="btn-phase-indicator" class="engagement-btn" 
                data-event-type="phase_click" title="Click to acknowledge current phase">
            🔄 PERCEIVE
        </button>
        <button id="btn-state-toggle" class="engagement-btn" 
                data-event-type="state_toggle" title="Toggle visualization mode">
            ⚙️ MODE
        </button>
        <button id="btn-feedback" class="engagement-btn" 
                data-event-type="feedback" title="Provide feedback on system state">
            💬 FEEDBACK
        </button>
    </div>
    
    <style>
        .engagement-btn {
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 12px;
            margin-left: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        .engagement-btn:hover {
            background: rgba(0, 255, 204, 0.4);
            box-shadow: 0 0 10px #00ffcc66;
        }
        .engagement-btn:active {
            transform: scale(0.95);
        }
    </style>

    <!-- External control indicator -->
    <div id="control-indicator">External Control: DISCONNECTED</div>

    <script type="module">
    // Unified Visualization Engine for C364 Cognitive Architecture
    import VisualizationEngine from './viz_engine.js';
    import { WebSocket } from 'ws';
    
    // Interactive cursor ring (kept from original design)
    const cursorRing = document.getElementById('cursor-ring');
    const hint = document.getElementById('interaction-hint');
    const controlIndicator = document.getElementById('control-indicator');
    
    document.addEventListener('mousemove', (e) => {
        if (cursorRing) {
            cursorRing.style.left = e.clientX + 'px';
            cursorRing.style.top = e.clientY + 'px';
        }
    });
    
    document.addEventListener('mouseenter', () => {
        if (hint) hint.style.opacity = '0';
    });
    
    document.addEventListener('mouseleave', () => {
        if (hint) hint.style.opacity = '0.6';
    });
    
    // Initialize unified visualization engine
    let vizEngine;
    try {
        vizEngine = new VisualizationEngine();
        console.log('[Cortana] Unified visualization initialized');
    } catch(e) {
        console.error('[Cortana] Viz initialization failed:', e);
    }
    
    // State polling and synchronization
    async function syncState() {
        try {
            const response = await fetch('../state/current-state.json');
            if (!response.ok) throw new Error('No state file found');
            
            const state = await response.json();
            
            // Update UI display values
            document.getElementById('val-cycle').innerText = state.cycle || 0;
            document.getElementById('val-phase').innerText = state.phase || 'UNKNOWN';
            document.getElementById('val-status').innerText = state.status || '';
            document.getElementById('val-tension').innerText = 
                state.daemon_status?.sensors_simulated ? 'Simulated' : 
                state.internal_tension !== undefined ? state.internal_tension.toFixed(3) : '-';
            document.getElementById('val-focus').innerText = 'Visual Translation Layer';
            
            // Pass state to visualization engine (phase-based formations)
            if (vizEngine && state.phase) {
                vizEngine.update({
                    phase: state.phase,
                    internal_tension: state.internal_tension || 0.5,
                    cycle: state.cycle || 0
                });
            }
            
        } catch(e) {
            console.log('[Cortana] State sync error:', e.message);
            // Fallback simulation for demo purposes
            simulateState();
        }
    }
    
    function simulateState() {
        // Demo mode with simulated cognitive states
        const phases = ['PERCEIVE', 'REFLECT', 'DECIDE', 'ACT', 'CONSOLIDATE', 'PERSIST'];
        const phaseIndex = Date.now() % 6;
        
        const simState = {
            cycle: Math.floor(Date.now() / 1000),
            phase: phases[phaseIndex],
            status: 'Demo Mode - Simulating Cognitive Cycle',
            internal_tension: 0.3 + Math.random() * 0.4,
            external_focus: 'Visual Translation Layer'
        };
        
        document.getElementById('val-cycle').innerText = simState.cycle;
        document.getElementById('val-phase').innerText = simState.phase;
        document.getElementById('val-status').innerText = simState.status;
        document.getElementById('val-tension').innerText = simState.internal_tension.toFixed(3);
        document.getElementById('val-focus').innerText = simState.external_focus;
        
        if (vizEngine) {
            vizEngine.update(simState);
        }
    }
    
    // WebSocket control connection
    let ws = null;
    
    function updateControlStatus(connectedCount) {
        if (connectedCount > 0) {
            controlIndicator.textContent = `External Control: CONNECTED (${connectedCount} client${connectedCount > 1 ? 's' : ''})`;
            controlIndicator.classList.add('connected');
        } else {
            controlIndicator.textContent = 'External Control: DISCONNECTED';
            controlIndicator.classList.remove('connected');
        }
    }
    
    // Connect to projection server WebSocket
    function connectToServer() {
        try {
            ws = new WebSocket('ws://localhost:8766/ws');
            
            ws.onopen = () => {
                updateControlStatus(1);
                console.log('[WS] Connected to projection server');
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'state_update') {
                        // Update visualization with received state
                        if (vizEngine && data.data) {
                            vizEngine.update(data.data);
                        }
                    } else if (data.type === 'ack') {
                        console.log(`[ACK] ${data.command}`);
                    } else if (data.type === 'error') {
                        console.error('[ERROR]', data.message);
                    }
                } catch(e) {
                    console.error('Invalid message:', e);
                }
            };
            
            ws.onerror = (err) => {
                console.error('[WS] Error:', err.message);
                updateControlStatus(0);
            };
            
            ws.onclose = () => {
                updateControlStatus(0);
                console.log('[WS] Disconnected, reconnecting in 3s...');
                setTimeout(connectToServer, 3000);
            };
        } catch(e) {
            console.log('[WS] Connection failed, retrying...');
            setTimeout(connectToServer, 3000);
        }
    }
    
    // Initialize
    syncState();
    setInterval(syncState, 2000);
    connectToServer();


     
    // Engagement button handlers - emit analytics events on click
    document.addEventListener('DOMContentLoaded', () => {
        const engagementButtons = [
            { id: 'btn-phase-indicator', eventType: 'phase_click' },
            { id: 'btn-state-toggle', eventType: 'state_toggle' },
            { id: 'btn-feedback', eventType: 'feedback' }
        ];
        
        engagementButtons.forEach(btn => {
            const element = document.getElementById(btn.id);
            if (element) {
                element.addEventListener('click', async (e) => {
                    console.log(`[Cortana] Engagement event triggered: ${btn.eventType}`);
                    
                    try {
                        await fetch('http://localhost:8767/events', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                type: btn.eventType,
                                phase: vizEngine?.state?.phase || 'UNKNOWN',
                                timestamp: new Date().toISOString(),
                                session_id: sessionStorage.getItem('session_id') || 'anon'
                            })
                        });
                        
                        // Visual feedback
                        element.style.background = 'rgba(0, 255, 204, 0.6)';
                        setTimeout(() => {
                            element.style.background = '';
                        }, 200);
                    } catch (err) {
                        console.error('[Cortana] Analytics emit failed:', err);
                    }
                });
            }
        });
    });
    
    </script>
</body>
</html>
