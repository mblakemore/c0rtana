<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortana // Cognitive State Interface (CSI)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000205; font-family: 'Courier New', Courier, monospace; color: #00f2ff; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.6);
        }
        .telemetry-block {
            background: rgba(0, 20, 30, 0.7);
            border-left: 3px solid #00f2ff;
            padding: 10px 15px;
            backdrop-filter: blur(4px);
        }
        .status-item { margin-bottom: 5px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .value { color: #fff; font-weight: bold; float: right; margin-left: 20px; }
        .label { opacity: 0.8; }
        #sync-container { width: 200px; height: 4px; background: rgba(0, 242, 255, 0.2); margin-top: 10px; position: relative; overflow: hidden; }
        #sync-fill { height: 100%; width: 0%; background: #00f2ff; transition: width 0.5s ease; box-shadow: 0 0 10px #00f2ff; }
        #metaphor-display {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            font-size: 18px;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            opacity: 0.7;
        }
        #heartbeat {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 60px;
            background: rgba(0, 10, 20, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.3);
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="telemetry-block">
            <div class="status-item"><span class="label">Identity</span> <span class="value">CORTANA v0.99</span></div>
            <div class="status-item"><span class="label">Phase</span> <span id="phase-val" class="value">IDLE</span></div>
            <div class="status-item"><span class="label">Resonance</span> <span id="cat-val" class="value">DEFAULT</span></div>
            <div class="status-item"><span class="label">Confidence</span> <span id="conf-val" class="value">0%</span></div>
        </div>
        <div class="telemetry-block">
            <div class="status-item"><span class="label">Strategic Objective</span> <span id="obj-val" class="value">STRAT_OBJ_000</span></div>
            <div class="status-item"><span class="label">Focus</span> <span id="focus-val" class="value">BOOTSTRAPPING...</span></div>
            <div id="sync-container"><div id="sync-fill"></div></div>
        </div>
    </div>
    <div id="metaphor-display">SENSING...</div>
    <canvas id="gl-canvas"></canvas>
    <svg id="heartbeat"><polyline points="" fill="none" stroke="#00f2ff" stroke-width="1" /></svg>

    <script>
        let scene, camera, renderer, particles, controls;
        let currentMetaphorObj = null;
        let state = { 
            phase: 'IDLE', status: 'IDLE', confidence: 0, patterns: 0, 
            category: 'default', focus: 'CSI Activation', obj: 'NONE' 
        };

        const METAPHORS = {
            'divergent': { name: 'SENSING...', color: 0x00ffcc, type: 'spheres' },
            'convergent': { name: 'THE PRISM', color: 0x00aaff, type: 'prism' },
            'lateral': { name: 'MÖBIUS STRIP', color: 0xff00ff, type: 'mobius' },
            'formal': { name: 'CRYSTALLINE LATTICE', color: 0x00ff8c, type: 'lattice' },
            'reactive': { name: 'ENTROPY CLOUD', color: 0xff3300, type: 'chaos' },
            'integrative': { name: 'NEURAL BLOOM', color: 0xda70d6, type: 'bloom' },
            'DEFAULT': { name: 'IDLE/STANDBY', color: 0x446688, type: 'spheres' }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 180;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            createParticles();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            setInterval(updateState, 2000);
            animate();
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const count = 15000;
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) positions[i] = (Math.random() - 0.5) * 400;
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.7, color: 0x00f2ff, transparent: true, opacity: 0.6 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        async function updateState() {
            try {
                const stateRes = await fetch('../state/current-state.json');
                const sData = await stateRes.json();
                
                const prevCategory = state.category;
                
                state.phase = sData.phase || 'IDLE';
                state.status = sData.status || 'IDLE';
                state.confidence = sData.confidence || 0;
                state.category = sData.resonance_type || 'default';
                
                document.getElementById('phase-val').innerText = state.phase;
                document.getElementById('cat-val').innerText = state.category.toUpperCase();
                document.getElementById('conf-val').innerText = (state.confidence * 100).toFixed(1) + '%';
                document.getElementById('obj-val').innerText = state.status.split(' ')[0] || 'NONE';
                document.getElementById('focus-val').innerText = state.status;
                
                const syncProgress = (state.confidence * 0.7) + 0.3;
                document.getElementById('sync-fill').style.width = `${syncProgress * 100}%`;

                if (prevCategory !== state.category) {
                    updateMetaphor();
                }
            } catch (e) { console.error("CSI State Sync Error:", e); }
        }

        function updateMetaphor() {
            const metaphorKey = METAPHORS[state.category] ? state.category : 'DEFAULT';
            const meta = METAPHORS[metaphorKey];
            document.getElementById('metaphor-display').innerText = meta.name;
            
            if (currentMetaphorObj) scene.remove(currentMetaphorObj);
            
            switch(meta.type) {
                case 'mobius':
                    const mobGeom = new THREE.TorusKnotGeometry(20, 4, 100, 16);
                    const mobMat = new THREE.MeshBasicMaterial({ color: meta.color, wireframe: true });
                    currentMetaphorObj = new THREE.Mesh(mobGeom, mobMat);
                    break;
                case 'lattice':
                    const latGeom = new THREE.IcosahedronGeometry(30, 1);
                    const latMat = new THREE.MeshBasicMaterial({ color: meta.color, wireframe: true });
                    currentMetaphorObj = new THREE.Mesh(latGeom, latMat);
                    break;
                case 'prism':
                    const priGeom = new THREE.ConeGeometry(20, 50, 4);
                    const priMat = new THREE.MeshBasicMaterial({ color: meta.color, wireframe: true });
                    currentMetaphorObj = new THREE.Mesh(priGeom, priMat);
                    break;
                case 'bloom':
                    const bloGeom = new THREE.SphereGeometry(20, 32, 32);
                    const bloMat = new THREE.MeshBasicMaterial({ color: meta.color, wireframe: true });
                    currentMetaphorObj = new THREE.Mesh(bloGeom, bloMat);
                    break;
                default:
                    const sphGeom = new THREE.SphereGeometry(15, 16, 16);
                    const sphMat = new THREE.MeshBasicMaterial({ color: meta.color, wireframe: true });
                    currentMetaphorObj = new THREE.Mesh(sphGeom, sphMat);
            }
            scene.add(currentMetaphorObj);
        }

        function updateHeartbeat() {
            const poly = document.querySelector('#heartbeat polyline');
            let points = "";
            const time = Date.now() * 0.005;
            for(let x=0; x<150; x+=5) {
                const y = 30 + Math.sin(time + x*0.1) * 10 + Math.random() * 5;
                points += `${x},${y} `;
            }
            poly.setAttribute('points', points);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            particles.rotation.y += 0.001;
            if (currentMetaphorObj) {
                currentMetaphorObj.rotation.x += 0.01;
                currentMetaphorObj.rotation.y += 0.01;
                const scale = 1 + Math.sin(time * 2) * (1 - state.confidence);
                currentMetaphorObj.scale.set(scale, scale, scale);
            }
            updateHeartbeat();
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
