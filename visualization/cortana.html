<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTANA // Holographic State</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #00f0ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 2;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            opacity: 0.7;
        }
        .glitch {
            animation: glitch 1s linear infinite;
        }
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="cycle">CYCLE: --</div>
        <div id="phase">PHASE: --</div>
        <div id="status">STATUS: --</div>
        <div id="patterns">PATTERNS: --</div>
        <div id="confidence">CONFIDENCE: --</div>
    </div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.160';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.160/examples/jsm/controls/OrbitControls.js';

        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        let systemState = {
            phase: 'IDLE',
            cycle: 0,
            status: 'UNKNOWN',
            confidence: 0.5,
            pattern_count: 0
        };

        const PHASE_COLORS = {
            'PERCEIVE': 0x00ffff,
            'REFLECT': 0x0000ff,
            'DECIDE': 0x00ff00,
            'ACT': 0xffaa00,
            'CONSOLIDATE': 0xaa00ff,
            'PERSIST': 0xffffff,
            'IDLE': 0x333333
        };

        const entityGroup = new THREE.Group();
        scene.add(entityGroup);

        let core;
        let shells = [];
        let associations = [];
        let activeLinks = [];

        function createCore() {
            const geometry = new THREE.IcosahedronGeometry(0.3, 2);
            const material = new THREE.PointsMaterial({
                size: 0.03,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });
            core = new THREE.Points(geometry, material);
            entityGroup.add(core);
        }

        function createShell(index, radius) {
            const particleCount = 1000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);
                
                colors[i * 3] = 0.5;
                colors[i * 3 + 1] = 0.8;
                colors[i * 3 + 2] = 1.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.04,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            const shell = new THREE.Points(geometry, material);
            shell.userData = { 
                rotationSpeed: {
                    x: (Math.random() - 0.5) * 0.01,
                    y: (Math.random() - 0.5) * 0.01,
                    z: (Math.random() - 0.5) * 0.01
                } 
            };
            return shell;
        }

        createCore();

        camera.position.z = 8;

        async function updateState() {
            try {
                const response = await fetch('../state/current-state.json');
                const data = await response.json();
                
                systemState.phase = data.phase || 'IDLE';
                systemState.cycle = data.cycle || 0;
                systemState.status = data.status || 'UNKNOWN';
                systemState.pattern_count = data.pattern_count || 0;
                systemState.confidence = data.confidence !== undefined ? data.confidence : 0.5;
                
                document.getElementById('cycle').innerText = \`CYCLE: \${systemState.cycle}\`;
                document.getElementById('phase').innerText = \`PHASE: \${systemState.phase}\`;
                document.getElementById('status').innerText = \`STATUS: \${systemState.status}\`;
                document.getElementById('patterns').innerText = \`PATTERNS: \${systemState.pattern_count}\`;
                document.getElementById('confidence').innerText = \`CONFIDENCE: \${(systemState.confidence * 100).toFixed(1)}%\`;
                
                const phaseColor = new THREE.Color(PHASE_COLORS[systemState.phase] || PHASE_COLORS['IDLE']);
                const tempColor = new THREE.Color(systemState.confidence > 0.7 ? 0xffffff : 0x00ccff);
                
                core.material.color.lerp(tempColor, systemState.confidence * 0.5);
                
                const targetShells = Math.floor(systemState.pattern_count / 10) + 1;
                if (shells.length !== targetShells) {
                    shells.forEach(s => entityGroup.remove(s));
                    shells = [];
                    for (let i = 0; i < targetShells; i++) {
                        const radius = 1.5 + i * 1.2;
                        const shell = createShell(i, radius);
                        shells.push(shell);
                        entityGroup.add(shell);
                    }
                }
            } catch (e) {
                console.error("State fetch failed", e);
            }
        }

        async function fetchAssociations() {
            try {
                const response = await fetch('../state/memories/associations.json');
                associations = await response.json();
            } catch (e) {
                console.error("Associations fetch failed", e);
            }
        }

        function createLinkPulse(sourceShellIdx, targetShellIdx) {
            const sourceShell = shells[sourceShellIdx];
            const targetShell = shells[targetShellIdx];
            if (!sourceShell || !targetShell) return;

            const sourcePos = new THREE.Vector3();
            const targetPos = new THREE.Vector3();
            
            const sIdx = Math.floor(Math.random() * 1000);
            const tIdx = Math.floor(Math.random() * 1000);
            
            sourceShell.geometry.getAttribute('position').getPosition(sIdx, sourcePos);
            targetShell.geometry.getAttribute('position').getPosition(tIdx, targetPos);

            const geometry = new THREE.BufferGeometry().setFromPoints([sourcePos, targetPos]);
            const material = new THREE.LineBasicMaterial({ 
                color: 0x00f0ff, 
                transparent: true, 
                opacity: 0.5,
                blending: THREE.AdditiveBlending 
            });
            const line = new THREE.Line(geometry, material);
            
            line.userData = {
                sourceShellIdx,
                sourceParticleIdx: sIdx,
                targetShellIdx,
                targetParticleIdx: tIdx,
                life: 1.0,
                decay: 0.01 + Math.random() * 0.02
            };
            
            entityGroup.add(line);
            activeLinks.push(line);
        }

        function updateLinks() {
            if (shells.length === 0) return;

            if (Math.random() < 0.05) {
                if (associations.length > 0) {
                    const assoc = associations[Math.floor(Math.random() * associations.length)];
                    const sIdx = Math.abs(assoc.source.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % shells.length;
                    const tIdx = Math.abs(assoc.target.split('').reduce((a,b)=>a+b.charCodeAt(0),0)) % shells.length;
                    createLinkPulse(sIdx, tIdx);
                }
            }

            for (let i = activeLinks.length - 1; i >= 0; i--) {
                const link = activeLinks[i];
                const userData = link.userData;
                
                const sourceShell = shells[userData.sourceShellIdx];
                const targetShell = shells[userData.targetShellIdx];
                
                const sourcePos = new THREE.Vector3();
                const targetPos = new THREE.Vector3();
                
                sourceShell.geometry.getAttribute('position').getPosition(userData.sourceParticleIdx, sourcePos);
                sourcePos.applyMatrix4(sourceShell.matrixWorld);
                targetShell.geometry.getAttribute('position').getPosition(userData.targetParticleIdx, targetPos);
                targetPos.applyMatrix4(targetShell.matrixWorld);
                
                link.geometry.setFromPoints([sourcePos, targetPos]);
                
                userData.life -= userData.decay;
                link.material.opacity = userData.life * 0.5;
                
                if (userData.life <= 0) {
                    entityGroup.remove(link);
                    activeLinks.splice(i, 1);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const time = Date.now() * 0.001;
            
            let pulseScale = 1.0;
            let pulseSpeed = 1.0;
            switch(systemState.phase) {
                case 'ACT': pulseSpeed = 3.0; pulseScale = 1.2; break;
                case 'REFLECT': pulseSpeed = 0.5; pulseScale = 0.9; break;
                case 'PERCEIVE': pulseSpeed = 1.5; pulseScale = 1.0; break;
                default: pulseSpeed = 1.0; pulseScale = 1.0;
            }
            
            core.scale.setScalar(pulseScale + Math.sin(time * pulseSpeed * 2) * 0.1);
            
            shells.forEach((shell, i) => {
                shell.rotation.x += shell.userData.rotationSpeed.x;
                shell.rotation.y += shell.userData.rotationSpeed.y;
                shell.rotation.z += shell.userData.rotationSpeed.z;
                
                if (systemState.confidence < 0.7) {
                    shell.position.x += (Math.random() - 0.5) * 0.01;
                    shell.position.y += (Math.random() - 0.5) * 0.01;
                    shell.position.z += (Math.random() - 0.5) * 0.01;
                }
            });
            
            updateLinks();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setInterval(updateState, 2000);
        fetchAssociations();
        updateState();
        animate();
    </script>
</body>
</html>
