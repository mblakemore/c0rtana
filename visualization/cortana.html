<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTANA // Holographic State</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #00f0ff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 2;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            opacity: 0.7;
        }
        .glitch {
            animation: glitch 1s linear infinite;
        }
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="cycle">CYCLE: --</div>
        <div id="phase">PHASE: --</div>
        <div id="status">STATUS: --</div>
    </div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.160';

        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // State Configuration
        let systemState = {
            phase: 'IDLE',
            cycle: 0,
            status: 'UNKNOWN',
            confidence: 0.5
        };

        // Visual Mappings
        const PHASE_COLORS = {
            'PERCEIVE': 0x00ffff, // Cyan
            'REFLECT': 0x0000ff,  // Deep Blue
            'DECIDE': 0x00ff00,   // Green
            'ACT': 0xffaa00,      // Gold
            'CONSOLIDATE': 0xaa00ff, // Purple
            'PERSIST': 0xffffff,  // White
            'IDLE': 0x333333      // Dark Grey
        };

        // Particle System
        const particleCount = 2000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 10;
            colors[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        camera.position.z = 5;

        async function updateState() {
            try {
                const response = await fetch('../state/current-state.json');
                const data = await response.json();
                
                systemState.phase = data.phase || 'IDLE';
                systemState.cycle = data.cycle || 0;
                systemState.status = data.status || 'UNKNOWN';
                
                document.getElementById('cycle').innerText = \`CYCLE: \${systemState.cycle}\`;
                document.getElementById('phase').innerText = \`PHASE: \${systemState.phase}\`;
                document.getElementById('status').innerText = \`STATUS: \${systemState.status}\`;
                
                const color = new THREE.Color(PHASE_COLORS[systemState.phase] || PHASE_COLORS['IDLE']);
                material.color.set(color);
            } catch (e) {
                console.error("State fetch failed", e);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;
            const positions = geometry.attributes.position.array;
            
            // Kinetic Coupling based on phase
            let speed = 0.01;
            let amplitude = 1.0;

            switch(systemState.phase) {
                case 'ACT': speed = 0.05; amplitude = 2.0; break;
                case 'REFLECT': speed = 0.005; amplitude = 0.5; break;
                case 'PERCEIVE': speed = 0.02; amplitude = 1.2; break;
            }

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const x = positions[i3];
                const y = positions[i3+1];
                const z = positions[i3+2];

                positions[i3] += Math.sin(time + y) * speed;
                positions[i3+1] += Math.cos(time + x) * speed;
                positions[i3+2] += Math.sin(time * 0.5) * speed;
            }
            
            geometry.attributes.position.needsUpdate = true;
            points.rotation.y += 0.002;
            points.rotation.x += 0.001;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        setInterval(updateState, 2000);
        updateState();
        animate();
    </script>
</body>
</html>
