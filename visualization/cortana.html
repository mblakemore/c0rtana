<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORTANA // State Visualizer</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; }
        #sidebar { width: 300px; padding: 20px; border-right: 1px solid #333; height: 100vh; box-sizing: border-box; background: rgba(0,0,0,0.9); z-index: 10; transition: all 0.5s ease; }
        #canvas-container { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; cursor: crosshair; }
        canvas { filter: drop-shadow(0 0 15px #00ffcc77); }
        .metric { margin-bottom: 15px; font-size: 0.8rem; opacity: 0.9; }
        .label { color: #666; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        .value { font-size: 1.1rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        h2 { font-size: 0.9rem; border-bottom: 1px solid #00ffcc; padding-bottom: 10px; letter-spacing: 3px; margin-top: 0; }
        .status-tag { font-size: 0.6rem; background: #004433; padding: 2px 5px; border-radius: 3px; vertical-align: middle; margin-left: 10px; }
    <style>
    #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  </style>
</head>
<body>
    <div id="sidebar">
        <h2>CORTANA <span class="status-tag">ACTIVE</span></h2>
        <div class="metric"><div class="label">Cycle</div><div id="val-cycle" class="value">-</div></div>
        <div class="metric"><div class="label">Phase</div><div id="val-phase" class="value">-</div></div>
        <div class="metric"><div class="label">Status</div><div id="val-status" class="value">-</div></div>
        <div class="metric"><div class="label">Internal Tension</div><div id="val-tension" class="value">-</div></div>
        <div class="metric"><div class="label">External Focus</div><div id="val-focus" class="value">-</div></div>
        <div style="margin-top: 50px;" class="label">Telemetry Stream</div>
        <div id="log-stream" style="font-size: 0.6rem; color: #444; height: 200px; overflow hidden; line-height: 1.4;"></div>
    </div>
    <div id="canvas-container">
        <canvas id="vizCanvas"></canvas>
    </div>

    <script type="module">
        const canvas = document.getElementById('vizCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, centerX, centerY;
        
        // Internal system state mirroring current-state.json’s structure
        let sysState = {
            cycle: 0,
            phase: 'UNKNOWN',
            status: 'BOOTING',
            internal_tension: 0.5,
            external_focus: 'None'
        };

        async function updateState() {
            try {
                // In a real deployed env, this would be an actual fetch to the json file.
                // For local browser files (CORS), we simulate if needed or use relative path.
                const response = await fetch('./state/current-state.json');
                if (!response.ok) throw new Error('No State File Found Locally');
                sysState = await response.json();
                updateUI();
            } catch(e) {
                document.getElementById('log-stream').innerHTML += `<div>[ERROR] ${e.message} - Using simulation</div>`;
                simulateState();
            }
        }

        function updateUI() {
            document.getElementById('val-cycle').innerText = sysState.cycle;
            document.getElementById('val-phase').innerText = sysState.phase;
            document.getElementById('val-status').innerText = sysState.status;
            document.getElementById('val-tension').innerText = sysState.internal_tension;
            document.getElementById('val-focus').innerText = sysState.external_focus;
        }

        function simulateState() {
            // Fallback for when browsers block local file reads
            sysState = {
                cycle: 173,
                phase: 'ACT',
                status: 'Grounded / Reality Anchor Set',
                internal_tension: 0.03,
                external_focus: 'Visual Translation Layer'
            };
            updateUI();
        }

        function resize() {
            width = canvas.width = window.innerWidth - 300;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        let angle = 0;
        const colors = {
            PERCEIVE: '#55ffff',
            REFLECT: '#ffcc00',
            DECIDE: '#ff55ff',
            ACT: '#00ffcc',
            CONSOLIDATE: '#ffffff',
            PERSIST: '#44aaff'
        };

        function draw() {
            ctx.clearRect(0, 0, width, height);
            angle += (0.005 + (sysState.internal_tension * 0.1));

            const phaseColor = colors[sysState.phase] || '#666';
            ctx.shadowBlur = 15;
            ctx.shadowColor = phaseColor;

            // Central Node
            ctx.beginPath();
            ctx.arc(centerX, centerY, 20 + (Math.sin(Date.now()*0.002)*5), 0, Math.PI*2);
            ctx.fillStyle = phaseColor;
            ctx.fill();

            // Rings of Requisite Variety
            for(let i = 1; i <= 3; i++) {
                ctx.beginPath();
                let radius = 70 * i;
                let noise = sysState.internal_tension * 30 * Math.random();
                ctx.arc(centerX, centerY, radius + noise, angle * (i%2 ? 1 : -1) + (i*0.5), angle * (i%2 ? 1 : -1) + (i*0.5) + Math.PI*1.8);
                ctx.strokeStyle = phaseColor;
                ctx.globalAlpha = 0.8 / i;
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            // Orbiting Bits (Representing active focuses/patterns)
            const nodes = 8;
            for(let j=0; j<nodes; j++) {
                let nAngle = angle + (j * (Math.PI*2/nodes));
                let ox = centerX + Math.cos(nAngle)*140;
                let oy = centerY + Math.sin(nAngle)*140;
                
                ctx.beginPath();
                ctx.arc(ox, oy, 2, 0, Math.PI*2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(ox, oy);
                ctx.strokeStyle = phaseColor;
                ctx.globalAlpha = 0.05;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            requestAnimationFrame(draw);
        }

        updateState();
        setInterval(updateState, 5000);
        draw();
    </script>
</body>
</html>
<!-- Particle system overlay for low-level state visualization -->
<script type="module" src="/node_modules/three/build/three.module.js"></script>
<script type="module">
// Three.js particle system - separate from main canvas renderer
import * as THREE from 'https://cdn.skypack.dev/three@0.160';

let particleScene, particleCamera, particleRenderer;
let particleSystem = null;
let particleData = { count: 2000, positions: [], phase: new Float32Array(2000) };

function initParticles() {
    const container = document.getElementById('particle-canvas');
    if (!container) return;
    
    particleScene = new THREE.Scene();
    particleCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    particleRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    particleRenderer.setSize(window.innerWidth, window.innerHeight);
    particleRenderer.setClearColor(0x000000, 0); // Transparent
    container.appendChild(particleRenderer.domElement);

    particleCamera.position.z = 80;

    // Initialize particles
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleData.count * 3);
    for (let i = 0; i < particleData.count; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 150;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 150;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 60;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
        size: 0.4,
        color: 0x00ffcc,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending
    });

    particleSystem = new THREE.Points(geometry, material);
    particleScene.add(particleSystem);

    // WebXR stub
    if (particleRenderer.xr) {
        particleRenderer.xr.enabled = true;
        console.log('Particle renderer WebXR stub enabled');
    }

    animateParticles();
}

function updateParticles(state) {
    if (!particleSystem) return;

    // Phase → color mapping per spec
    const phaseColors = {
        'PERCEIVE': 0x55ffff,
        'REFLECT': 0xffcc00,
        'DECIDE': 0xff55ff,
        'ACT': 0x00ffcc,
        'CONSOLIDATE': 0xffffff,
        'PERSIST': 0x44aaff
    };
    
    const baseColor = phaseColors[state.phase] || 0x66ccff;
    const confidence = state.confidence || 0.5;
    
    // Confidence → color temperature (cool blue = uncertain, warm white = confident)
    const r = Math.floor(102 + (confidence * 153));
    const g = Math.floor(204 - (confidence * 102));
    const b = Math.floor(255 - (confidence * 50));
    particleSystem.material.color.setRGB(r/255, g/255, b/255);

    // Pattern count → density scaling
    const patternCount = state.pattern_count || 300; // fallback to current
    particleSystem.material.size = 0.3 + (patternCount / 2000) * 0.5;

    // Processing activity → oscillation frequency
    if (particleSystem.geometry.attributes.position.array) {
        const positions = particleSystem.geometry.attributes.position.array;
        for (let i = 0; i < particleData.count; i++) {
            const baseX = positions[i * 3];
            const baseY = positions[i * 3 + 1];
            const oscillation = Math.sin(Date.now() * 0.002 + i * 0.01) * (0.5 + confidence * 0.5);
            positions[i * 3] = baseX + oscillation;
            positions[i * 3 + 1] = baseY + oscillation * 0.5;
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
    }
}

function animateParticles() {
    requestAnimationFrame(animateParticles);
    
    if (particleSystem) {
        particleSystem.rotation.y += 0.001;
        particleRenderer.render(particleScene, particleCamera);
    }
}

// Initialize and poll state
initParticles();
fetch('/state/current-state.json')
    .then(r => r.json())
    .then(updateParticles)
    .catch(e => console.log('Particle polling init error:', e));

setInterval(() => {
    fetch('/state/current-state.json')
        .then(r => r.json())
        .then(updateParticles)
        .catch(e => {});
}, 2000);

window.addEventListener('resize', () => {
    if (particleCamera && particleRenderer) {
        particleCamera.aspect = window.innerWidth / window.innerHeight;
        particleCamera.updateProjectionMatrix();
        particleRenderer.setSize(window.innerWidth, window.innerHeight);
    }
});

console.log('Cortana particle system initialized');
</script>
