<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortana // Semantic Resonance Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #00050a; font-family: 'Courier New', Courier, monospace; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f2ff;
            text-shadow: 0 0 5px #00f2ff;
            pointer-events: none;
            z-index: 10;
        }
        .status-item { margin-bottom: 5px; font-size: 12px; text-transform: uppercase; }
        .value { color: #fff; font-weight: bold; }
        #gl-canvas { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="status-item">Phase: <span id="phase-val" class="value">LOADING...</span></div>
        <div class="status-item">Category: <span id="cat-val" class="value">LOADING...</span></div>
        <div class="status-item">Status: <span id="status-val" class="value">LOADING...</span></div>
        <div class="status-item">Pattern Density: <span id="density-val" class="value">0</span></div>
        <div class="status-item">Confidence: <span id="conf-val" class="value">0%</span></div>
    </div>
    <canvas id="gl-canvas"></canvas>

    <script>
        let scene, camera, renderer, particles, lines;
        let state = { phase: 'IDLE', status: 'IDLE', confidence: 0, patterns: 0, associations: [], category: 'default' };

        const RESONANCE_MAP = {
            'logic':       { color: 0x00f2ff, speed: 0.001, turbulence: 0.1, shape: 'geometric' },
            'memory':      { color: 0x9d00ff, speed: 0.003, turbulence: 0.5, shape: 'fluid' },
            'communication': { color: 0x00ff8c, speed: 0.008, turbulence: 0.8, shape: 'oscillating' },
            'system':       { color: 0xffffff, speed: 0.002, turbulence: 0.2, shape: 'symmetrical' },
            'visualization': { color: 0xffcc00, speed: 0.004, turbulence: 0.4, shape: 'expansive' },
            'default':      { color: 0x446688, speed: 0.002, turbulence: 0.3, shape: 'ambient' }
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 80;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(2000 * 3);
            const colors = new Float32Array(2000 * 3);

            for (let i = 0; i < 6000; i++) {
                positions[i] = (Math.random() - 0.5) * 120;
                colors[i] = Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({ size: 0.7, vertexColors: true, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            lines = new THREE.Group();
            scene.add(lines);

            window.addEventListener('resize', onWindowResize, false);
            updateState();
            animate();
            setInterval(updateState, 2000);
        }

        async function updateState() {
            try {
                const stateRes = await fetch('../state/current-state.json');
                const stateData = await stateRes.json();
                
                const assocRes = await fetch('../state/memories/associations.json');
                const assocData = await assocRes.json();

                state.phase = stateData.phase || 'IDLE';
                state.status = stateData.status || 'IDLE';
                state.confidence = stateData.confidence || 0;
                state.category = stateData.current_category || 'default';
                state.patterns = stateData.pattern_count || 0;
                state.associations = Array.isArray(assocData) ? assocData : [];

                document.getElementById('phase-val').innerText = state.phase;
                document.getElementById('cat-val').innerText = state.category;
                document.getElementById('status-val').innerText = state.status;
                document.getElementById('density-val').innerText = state.patterns;
                document.getElementById('conf-val').innerText = (state.confidence * 100).toFixed(1) + '%';

                updateVisuals();
            } catch (e) {
                console.error("State synchronization error:", e);
            }
        }

        function updateVisuals() {
            const resonance = RESONANCE_MAP[state.category] || RESONANCE_MAP['default'];
            
            // Lerp confidence into the color temperature
            const baseColor = new THREE.Color(resonance.color);
            const targetColor = new THREE.Color().setHSL(0.6 - (state.confidence * 0.4), 1.0, 0.5);
            baseColor.lerp(targetColor, 0.3);
            
            particles.material.color = baseColor;

            lines.clear();
            if (state.associations.length > 0) {
                const lineGeom = new THREE.BufferGeometry();
                const linePos = [];
                const sample = state.associations.slice(0, 30);
                sample.forEach(() => {
                    const p1 = new THREE.Vector3((Math.random()-0.5)*80, (Math.random()-0.5)*80, (Math.random()-0.5)*80);
                    const p2 = new THREE.Vector3((Math.random()-0.5)*80, (Math.random()-0.5)*80, (Math.random()-0.5)*80);
                    linePos.push(p1.x, p1.y, p1.z, p2.x, p2.y, p2.z);
                });
                lineGeom.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));
                const line = new THREE.LineSegments(lineGeom, new THREE.LineBasicMaterial({ color: baseColor, opacity: 0.3, transparent: true }));
                lines.add(line);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const resonance = RESONANCE_MAP[state.category] || RESONANCE_MAP['default'];
            let speed = resonance.speed;
            
            // Phase modifiers
            if (state.phase === 'ACT') speed *= 3;
            if (state.phase === 'PERCEIVE') speed *= 0.5;

            particles.rotation.y += speed;
            particles.rotation.x += speed / 2;
            lines.rotation.y += speed;
            lines.rotation.x += speed / 2;
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
