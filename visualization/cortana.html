<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortana // Semantic Resonance Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #00050a; font-family: 'Courier New', Courier, monospace; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f2ff;
            text-shadow: 0 0 5px #00f2ff;
            pointer-events: none;
            z-index: 10;
        }
        .status-item { margin-bottom: 5px; font-size: 12px; text-transform: uppercase; }
        .value { color: #fff; font-weight: bold; }
        #gl-canvas { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="status-item">Phase: <span id="phase-val" class="value">LOADING...</span></div>
        <div class="status-item">Category: <span id="cat-val" class="value">LOADING...</span></div>
        <div class="status-item">Status: <span id="status-val" class="value">LOADING...</span></div>
        <div class="status-item">Pattern Density: <span id="density-val" class="value">0</span></div>
        <div class="status-item">Confidence: <span id="conf-val" class="value">0%</span></div>
    </div>
    <canvas id="gl-canvas"></canvas>

    <script>
        let scene, camera, renderer, particles, lines, controls, rings = [];
        let state = { phase: 'IDLE', status: 'IDLE', confidence: 0, patterns: 0, associations: [], category: 'default', queried_patterns: [] };
        let resonanceQueue = {}; // Map of ringIndex -> intensity (0.0 to 1.0)

        const RESONANCE_MAP = {
            'logic':       { color: 0x00f2ff, speed: 0.001, turbulence: 0.1, shape: 'geometric' },
            'memory':      { color: 0x9d00ff, speed: 0.003, turbulence: 0.5, shape: 'fluid' },
            'communication': { color: 0x00ff8c, speed: 0.008, turbulence: 0.8, shape: 'oscillating' },
            'system':       { color: 0xffffff, speed: 0.002, turbulence: 0.2, shape: 'symmetrical' },
            'visualization': { color: 0xffcc00, speed: 0.004, turbulence: 0.4, shape: 'expansive' },
            'default':      { color: 0x446688, speed: 0.002, turbulence: 0.3, shape: 'ambient' }
        };

        const PHASE_PROFILES = {
            'PERCEIVE':   { speedMult: 0.5, jitter: 2.0, pulseFreq: 0.5, opacityBase: 0.4, ringOsc: 1.0 },
            'REFLECT':    { speedMult: 0.7, jitter: 0.2, pulseFreq: 0.2, opacityBase: 0.6, ringOsc: 0.3 },
            'DECIDE':     { speedMult: 1.2, jitter: 0.8, pulseFreq: 2.0, opacityBase: 0.7, ringOsc: 2.5 },
            'ACT':        { speedMult: 4.0, jitter: 1.5, pulseFreq: 1.0, opacityBase: 0.9, ringOsc: 1.5 },
            'CONSOLIDATE': { speedMult: 0.4, jitter: 0.1, pulseFreq: 0.1, opacityBase: 0.5, ringOsc: 0.2 },
            'PERSIST':     { speedMult: 0.3, jitter: 0.0, pulseFreq: 0.0, opacityBase: 0.5, ringOsc: 0.1 },
            'IDLE':       { speedMult: 1.0, jitter: 0.5, pulseFreq: 0.5, opacityBase: 0.6, ringOsc: 1.0 }
        };

        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0; 
            }
            return Math.abs(hash);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 150;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            createParticles();

            lines = new THREE.Group();
            scene.add(lines);

            window.addEventListener('resize', onWindowResize, false);
            updateState();
            animate();
            setInterval(updateState, 2000);
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const count = 10000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 200;
                colors[i] = Math.random();
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({ size: 0.6, vertexColors: true, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        async function updateState() {
            try {
                const stateRes = await fetch('../state/current-state.json');
                const stateData = await stateRes.json();
                
                let assocData = [];
                try {
                    const assocRes = await fetch('../state/memories/associations.json');
                    assocData = await assocRes.json();
                } catch (e) { console.warn("Associations file not found or invalid"); }

                state.phase = stateData.phase || 'IDLE';
                state.status = stateData.status || 'IDLE';
                state.confidence = stateData.confidence || 0;
                state.category = stateData.current_category || 'default';
                state.patterns = stateData.pattern_count || 0;
                state.associations = Array.isArray(assocData) ? assocData : [];
                state.queried_patterns = Array.isArray(stateData.queried_patterns) ? stateData.queried_patterns : [];

                document.getElementById('phase-val').innerText = state.phase;
                document.getElementById('cat-val').innerText = state.category;
                document.getElementById('status-val').innerText = state.status;
                document.getElementById('density-val').innerText = state.patterns;
                document.getElementById('conf-val').innerText = (state.confidence * 100).toFixed(1) + '%';

                // Trigger resonance for queried patterns
                if (state.queried_patterns.length > 0 && rings.length > 0) {
                    state.queried_patterns.forEach(pid => {
                        const ringIdx = hashString(pid) % rings.length;
                        resonanceQueue[ringIdx] = 1.0; // Full intensity pulse
                    });
                }

                updateVisuals();
            } catch (e) {
                console.error("State synchronization error:", e);
            }
        }

        function updateVisuals() {
            const resonance = RESONANCE_MAP[state.category] || RESONANCE_MAP['default'];
            
            const baseColor = new THREE.Color(resonance.color);
            const targetColor = new THREE.Color().setHSL(0.6 - (state.confidence * 0.4), 1.0, 0.5);
            baseColor.lerp(targetColor, 0.3);
            
            particles.material.color = baseColor;
            
            const sizeScale = 0.5 + (Math.log10(state.patterns + 1) * 0.2);
            particles.material.size = sizeScale;

            updateRings(baseColor);

                                                                                                    
                lines.clear();
                if (state.associations.length > 0) {
                    const lineGeom = new THREE.BufferGeometry();
                    const linePos = [];
                    
                    state.associations.forEach(assoc => {
                        // assoc is expected to be an object {source, target, strength...} based on associations.json
                        const srcId = assoc.source;
                        const tgtId = assoc.target;
                        
                        const rSrcIdx = hashString(srcId) % rings.length;
                        const rTgtIdx = hashString(tgtId) % rings.length;
                        
                        // Only draw bridge if one of the endpoints is currently resonating
                        const intensity = Math.max(resonanceQueue[rSrcIdx] || 0, resonanceQueue[rTgtIdx] || 0);
                        
                        if (intensity > 0.1) {
                            // Calculate stable positions on the rings
                            const angleSrc = (rSrcIdx * 45) * (Math.PI / 180);
                            const radiusSrc = 20 + (rSrcIdx * 15);
                            const x1 = Math.cos(angleSrc) * radiusSrc;
                            const z1 = Math.sin(angleSrc) * radiusSrc;

                            const angleTgt = (rTgtIdx * 45) * (Math.PI / 180);
                            const radiusTgt = 20 + (rTgtIdx * 15);
                            const x2 = Math.cos(angleTgt) * radiusTgt;
                            const z2 = Math.sin(angleTgt) * radiusTgt;

                            linePos.push(x1, 0, z1, x2, 0, z2);
                        }
                    });

                    lineGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(linePos), 3));
                    const line = new THREE.LineSegments(lineGeom, new THREE.LineBasicMaterial({ 
                        color: baseColor, 
                        opacity: 0.6, 
                        transparent: true,
                        blending: THREE.AdditiveBlending 
                    }));
                    lines.add(line);
                }

        function updateRings(color) {
            rings.forEach(r => scene.remove(r));
            rings = [];

            const ringCount = Math.min(Math.ceil(state.patterns / 20), 5); 
            for (let i = 0; i < ringCount; i++) {
                const radius = 20 + (i * 15);
                const geometry = new THREE.TorusGeometry(radius, 0.2, 16, 100);
                const material = new THREE.MeshBasicMaterial({ 
                    color: color, 
                    transparent: true, 
                    opacity: 0.4 - (i * 0.05) 
                });
                const ring = new THREE.Mesh(geometry, material);
                ring.rotation.x = Math.PI / 2;
                scene.add(ring);
                rings.push(ring);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const resonance = RESONANCE_MAP[state.category] || RESONANCE_MAP['default'];
            const profile = PHASE_PROFILES[state.phase] || PHASE_PROFILES['IDLE'];
            
            let speed = resonance.speed * profile.speedMult;
            
            const time = Date.now() * 0.001;
            const turb = resonance.turbulence || 0.3;
            
            particles.material.opacity = profile.opacityBase + Math.sin(time * profile.pulseFreq * 2) * 0.2;
            
            switch(resonance.shape) {
                case 'geometric':
                    particles.position.x = Math.sin(time) * turb * 10 * profile.jitter;
                    particles.position.y = Math.cos(time) * turb * 10 * profile.jitter;
                    break;
                case 'fluid':
                    particles.position.x = Math.sin(time * 0.7) * turb * 20 * profile.jitter;
                    particles.position.y = Math.sin(time * 1.1) * turb * 20 * profile.jitter;
                    break;
                case 'oscillating':
                    particles.scale.setScalar(1 + Math.sin(time * 2) * 0.1 * profile.jitter);
                    break;
                case 'expansive':
                    particles.rotation.z += speed * 2;
                    break;
                default:
                    particles.position.x = Math.sin(time) * turb * 5 * profile.jitter;
                    particles.position.y = Math.cos(time * 0.8) * turb * 5 * profile.jitter;
            }
            
            particles.rotation.y += speed;
            particles.rotation.x += speed / 2;
            lines.rotation.y += speed;
            lines.rotation.x += speed / 2;
            
            rings.forEach((ring, idx) => {
                ring.rotation.z += speed * (1 + idx * 0.1);
                
                // Base oscillation from phase profile
                const ringPulse = Math.sin(time * profile.ringOsc + idx);
                ring.position.y = ringPulse * 2 * profile.ringOsc;

                // Semantic Resonance Pulse: integrate intensity from queue
                let semanticIntensity = resonanceQueue[idx] || 0;
                
                // Decay the pulse over time
                resonanceQueue[idx] = semanticIntensity * 0.96;

                // Combine base opacity with the semantic flash
                ring.material.opacity = (0.4 - (idx * 0.05)) + (ringPulse * 0.1) + (semanticIntensity * 0.6);
                
                // Visual scale shift during resonance
                if (semanticIntensity > 0.1) {
                    const scaleShift = 1 + (semanticIntensity * 0.2);
                    ring.scale.setScalar(scaleShift);
                } else {
                    ring.scale.setScalar(1.0);
                }
            });
            
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
