<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cortana — Persistent Presence</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e0e6ed;
      min-height: 100vh;
      padding: 2rem;
      line-height: 1.6;
    }
    .container { max-width: 900px; margin: 0 auto; }
    
    /* Header */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .cycle-number { font-size: 3rem; font-weight: 700; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .phase-badge { padding: 0.5rem 1rem; border-radius: 8px; background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.4); font-weight: 600; }
    
    /* Grid layout */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
    .card h3 { font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 1rem; }
    .metric { font-size: 2rem; font-weight: 700; }
    .metric.muted { color: #64748b; font-size: 1.25rem; }
    
    /* Predictions list */
    .predictions-list { max-height: 300px; overflow-y: auto; }
    .prediction-item { padding: 0.75rem; border-radius: 8px; background: rgba(255,255,255,0.03); margin-bottom: 0.5rem; font-size: 0.875rem; }
    .prediction-item.pending { border-left: 3px solid #fbbf24; }
    .prediction-item.validated { border-left: 3px solid #22c55e; }
    .prediction-id { font-weight: 700; color: #667eea; }
    .validation-date { color: #94a3b8; font-size: 0.75rem; margin-top: 0.25rem; }
    
    /* Status indicator */
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #22c55e; margin-right: 0.5rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    /* Footer */
    footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; color: #64748b; font-size: 0.75rem; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <div style="font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem;">CORTANA STATE</div>
        <div class="cycle-number" id="cycleNum">--</div>
      </div>
      <div>
        <span class="status-dot"></span><span id="lastUpdate">updating...</span>
      </div>
    </header>

    <div class="grid">
      <!-- Current Phase -->
      <div class="card">
        <h3>Current Phase</h3>
        <div class="metric" id="phase">--</div>
      </div>

      <!-- Patterns -->
      <div class="card">
        <h3>Patterns Stored</h3>
        <div class="metric" id="patterns">--</div>
      </div>

      <!-- Predictions -->
      <div class="card">
        <h3>Predictions Active</h3>
        <div class="metric" id="predictions">--</div>
      </div>

      <!-- Status -->
      <div class="card">
        <h3>Status</h3>
        <div class="metric muted" id="status">--</div>
      </div>

      <!-- Focus -->
      <div class="card" style="grid-column: span 2;">
        <h3>Focus</h3>
        <div id="focus" style="color: #cbd5e1; font-size: 0.875rem;"></div>
      </div>

      <!-- Recent Activity -->
      <div class="card" style="grid-column: span 2;">
        <h3>Last Artifact</h3>
        <div id="lastArtifact" style="color: #cbd5e1; font-size: 0.875rem;"></div>
      </div>
    </div>

    <!-- Pending Predictions -->
    <div class="card" style="margin-top: 2rem;">
      <h3>Pending Validations</h3>
      <div class="predictions-list" id="predictionsList"></div>
    </div>

    <footer>
      Polling every 5 seconds • Data from state/current-state.json • Cortana v1.0
    </footer>
  </div>

  <script type="module">
    async function fetchState() {
      try {
        const [stateRes, focusRes] = await Promise.all([
          fetch('/state/current-state.json'),
          fetch('/state/focus.json')
        ]);
        
        if (!stateRes.ok || !focusRes.ok) throw new Error('Failed to fetch state');
        
        const state = await stateRes.json();
        const focus = await focusRes.json();
        
        updateUI(state, focus);
      } catch (err) {
        console.error('State fetch error:', err);
      }
    }

    function updateUI(state, focus) {
      // Cycle number
      document.getElementById('cycleNum').textContent = `C${state.cycle}`;
      
      // Phase
      document.getElementById('phase').textContent = state.phase || '--';
      
      // Metrics
      document.getElementById('patterns').textContent = state.patterns_stored || 0;
      document.getElementById('predictions').textContent = state.predictions_deployed || 0;
      document.getElementById('status').textContent = state.status || '--';
      
      // Text fields
      document.getElementById('focus').textContent = focus.focus || 'No active focus';
      document.getElementById('lastArtifact').textContent = state.last_artifact || 'No recent artifact';
      
      // Last update timestamp
      const now = new Date();
      document.getElementById('lastUpdate').textContent = 
        `Updated: ${now.toLocaleTimeString()}`;
      
      // Render predictions list
      renderPredictions(state.falsifiable_predictions_deployed || []);
    }

    function renderPredictions(predictions) {
      const container = document.getElementById('predictionsList');
      if (!predictions || predictions.length === 0) {
        container.innerHTML = '<div style="color: #64748b; padding: 1rem;">No pending validations</div>';
        return;
      }
      
      container.innerHTML = predictions.map(p => {
        // Parse prediction string (format: "P_CXXX_NAME (validates DATE)" or just "P_CXXX_NAME")
        let id, validateAt;
        if (typeof p === 'string') {
          const match = p.match(/^(.+?)\s+\((.+)\)$/);
          if (match) {
            id = match[1];
            validateAt = match[2];
          } else {
            id = p;
            validateAt = null;
          }
        } else {
          id = p.id || 'Unknown';
          validateAt = p.validate_at || null;
        }
        
        return `
          <div class="prediction-item ${validateAt ? 'pending' : ''}">
            <span class="prediction-id">${id}</span>
            ${validateAt ? `<div class="validation-date">Validates: ${validateAt}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    // Initial fetch + polling every 5 seconds
    fetchState();
    setInterval(fetchState, 5000);
  </script>
</body>
</html>
